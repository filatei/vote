name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: Typecheck, build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Unit tests
        run: node --test $(find dist -name '*.test.js')

  deploy:
    name: Deploy to server
    needs: build-test
    # Only deploy on a real push to main (never on PRs), and only if tests pass.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Trigger deploy over SSH
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          # Origin IP, not vote.torama.money — that hostname is Cloudflare-proxied
          # now, so SSH (port 22) wouldn't reach the server through it.
          DEPLOY_HOST: 139.162.170.253
          DEPLOY_USER: vote
        run: |
          test -n "$DEPLOY_KEY" || { echo "DEPLOY_SSH_KEY secret is not set"; exit 1; }
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          # The key is locked to a forced command on the server, so the literal
          # command sent here is ignored — deploy.sh runs regardless.
          ssh -T -i ~/.ssh/deploy_key -o IdentitiesOnly=yes \
            "$DEPLOY_USER@$DEPLOY_HOST" deploy
