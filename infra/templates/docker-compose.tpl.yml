# Starter compose for a new app on the shared host.
# Generated by new-app.sh with __APP__ / __PORT__ filled in. Edit to taste —
# add the DB/cache services your app needs, keeping everything namespaced
# (__APP___*) and on the private __APP___net network. Only the app's port is
# published, and only on loopback, so Apache can reverse-proxy it.

name: __APP__

services:
  __APP___app:
    container_name: __APP___app
    build:
      context: ./app
    restart: unless-stopped
    env_file: .env
    networks:
      - __APP___net
    ports:
      - "127.0.0.1:__PORT__:__PORT__"

  # Example private datastore — delete if not needed.
  # __APP___postgres:
  #   container_name: __APP___postgres
  #   image: postgres:16-alpine
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  #   volumes:
  #     - __APP___pgdata:/var/lib/postgresql/data
  #   networks:
  #     - __APP___net

networks:
  __APP___net:
    name: __APP___net
    driver: bridge

