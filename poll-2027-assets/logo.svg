<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#008751"/>
      <stop offset="1" stop-color="#00633b"/>
    </linearGradient>
    <linearGradient id="disc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#008751"/>
      <stop offset="1" stop-color="#006339"/>
    </linearGradient>
    <clipPath id="innerClip">
      <circle cx="512" cy="512" r="368"/>
    </clipPath>
    <filter id="txtShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#04321c" flood-opacity="0.55"/>
    </filter>
    <path id="arcTop"    d="M 107 512 A 405 405 0 0 1 917 512"/>
    <path id="arcBottom" d="M 77  512 A 435 435 0 0 0 947 512"/>
  </defs>

  <!-- outer green ring -->
  <circle cx="512" cy="512" r="470" fill="url(#ring)" stroke="#004f2f" stroke-width="4"/>

  <!-- inner flag bands (green / white / green) -->
  <g clip-path="url(#innerClip)">
    <rect x="142" y="142" width="247" height="740" fill="#d3efe0"/>
    <rect x="389" y="142" width="246" height="740" fill="#ffffff"/>
    <rect x="635" y="142" width="247" height="740" fill="#d3efe0"/>
  </g>
  <circle cx="512" cy="512" r="368" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.6"/>

  <!-- faint star -->
  <path d="M512 344 L520.2 366.7 L544.3 367.5 L525.3 382.3 L532 405.5 L512 392 L492 405.5 L498.7 382.3 L479.7 367.5 L503.8 366.7 Z"
        fill="#008751" opacity="0.28"/>

  <!-- detail ring + green seal + check -->
  <circle cx="512" cy="512" r="178" fill="none" stroke="#008751" stroke-width="2" opacity="0.45"/>
  <circle cx="512" cy="512" r="150" fill="url(#disc)"/>
  <circle cx="512" cy="512" r="150" fill="none" stroke="#5cbf90" stroke-width="2" opacity="0.5"/>
  <path d="M450 514 L495 560 L585 456" fill="none" stroke="#ffffff"
        stroke-width="34" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- curved text on top, sitting on the green ring -->
  <g fill="#ffffff" filter="url(#txtShadow)"
     font-family="Georgia, 'Times New Roman', serif" font-weight="700"
     letter-spacing="7">
    <text font-size="48">
      <textPath href="#arcTop" startOffset="50%" text-anchor="middle">NAIJA DECIDES</textPath>
    </text>
    <text font-size="44">
      <textPath href="#arcBottom" startOffset="50%" text-anchor="middle">VOTE 2027</textPath>
    </text>
  </g>
</svg>
