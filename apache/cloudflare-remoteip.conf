# Host-wide real client IP behind Cloudflare (mod_remoteip).
#
# All torama.money apps share one Apache, so set this ONCE globally instead of
# per-vhost — it then applies to every site (vote, otuburu, neflo, daybook, …),
# including neflo whose :443 vhost is certbot-generated and not in any repo.
#
# Install on the server:
#   sudo cp cloudflare-remoteip.conf /etc/apache2/conf-available/
#   sudo a2enmod remoteip
#   sudo a2enconf cloudflare-remoteip
#   sudo systemctl reload apache2
#
# Refresh the ranges from https://www.cloudflare.com/ips/ if Cloudflare changes
# them. With this global config in place, the per-vhost RemoteIP* lines in the
# vote/otuburu vhosts are redundant and can be removed.

RemoteIPHeader CF-Connecting-IP
RemoteIPTrustedProxy 173.245.48.0/20 103.21.244.0/22 103.22.200.0/22 103.31.4.0/22 141.101.64.0/18 108.162.192.0/18 190.93.240.0/20 188.114.96.0/20 197.234.240.0/22 198.41.128.0/17 162.158.0.0/15 104.16.0.0/13 104.24.0.0/14 172.64.0.0/13 131.0.72.0/22
RemoteIPTrustedProxy 2400:cb00::/32 2606:4700::/32 2803:f800::/32 2405:b500::/32 2405:8100::/32 2a06:98c0::/29 2c0f:f248::/32

# Log the real client IP (use this LogFormat in your vhosts' CustomLog if you
# want accurate IPs in the access logs):
LogFormat "%a %l %u %t \"%r\" %>s %O \"%{Referer}i\" \"%{User-Agent}i\"" cloudflare
