# ============================================================================
# Apache reverse-proxy vhost for vote.torama.money
#
# Place at: /etc/apache2/sites-available/vote.torama.money.conf
# Enable:   a2ensite vote.torama.money && systemctl reload apache2
#
# Required modules (enable once):
#   a2enmod proxy proxy_http headers ssl rewrite remoteip
#
# Behind Cloudflare (orange-cloud proxy), the TCP peer is a Cloudflare edge IP.
# mod_remoteip (below) restores the real visitor IP from the CF-Connecting-IP
# header so the app's req.ip is correct — vote relies on it for one-vote-per-
# device and rate limiting. Keep TRUST_PROXY=true (Express trusts the single
# Apache hop, which now forwards the corrected client IP).
#
# TLS is provisioned by certbot (see DEPLOY.md). On first run certbot may add
# the SSLCertificate* lines for you; they are shown here for completeness.
# ============================================================================

<VirtualHost *:80>
    ServerName vote.torama.money

    # Allow Let's Encrypt HTTP-01 challenges through, redirect everything else.
    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteRule ^/?(.*) https://%{SERVER_NAME}/$1 [R=308,L]
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName vote.torama.money

    ProxyPreserveHost On
    ProxyRequests Off

    # ---- Real visitor IP behind Cloudflare (mod_remoteip) ----
    # Use Cloudflare's CF-Connecting-IP, trusting only Cloudflare's published
    # ranges as proxies. Refresh the list from https://www.cloudflare.com/ips/
    # if Cloudflare ever changes it.
    RemoteIPHeader CF-Connecting-IP
    RemoteIPTrustedProxy 173.245.48.0/20 103.21.244.0/22 103.22.200.0/22 103.31.4.0/22 141.101.64.0/18 108.162.192.0/18 190.93.240.0/20 188.114.96.0/20 197.234.240.0/22 198.41.128.0/17 162.158.0.0/15 104.16.0.0/13 104.24.0.0/14 172.64.0.0/13 131.0.72.0/22
    RemoteIPTrustedProxy 2400:cb00::/32 2606:4700::/32 2803:f800::/32 2405:b500::/32 2405:8100::/32 2a06:98c0::/29 2c0f:f248::/32

    # Tell the Node app the original scheme so it sets Secure cookies correctly.
    RequestHeader set X-Forwarded-Proto "https"

    # Reverse proxy to the container bound on loopback (matches APP_PORT).
    ProxyPass        /  http://127.0.0.1:8090/  retry=0
    ProxyPassReverse /  http://127.0.0.1:8090/

    # ---- Security headers ----
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "no-referrer"

    # ---- TLS ----
    SSLEngine on
    # Cloudflare Origin CA cert (recommended once this host is PROXIED). A single
    # *.torama.money origin cert covers vote/otuburu/neflo and never needs
    # renewal. Prerequisites before switching to these two lines: (1) the record
    # is proxied, (2) the cert+key exist on the server, (3) `apache2ctl
    # configtest` passes. See CLOUDFLARE.md → "Origin CA certificate".
    #SSLCertificateFile     /etc/ssl/cloudflare/torama.money.pem
    #SSLCertificateKeyFile  /etc/ssl/cloudflare/torama.money.key
    # Current: Let's Encrypt (managed by certbot). Renewal breaks once proxied —
    # switch to the Origin CA lines above, then certbot can be left to expire.
    SSLCertificateFile      /etc/letsencrypt/live/vote.torama.money/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/vote.torama.money/privkey.pem
    Include                 /etc/letsencrypt/options-ssl-apache.conf

    ErrorLog  ${APACHE_LOG_DIR}/vote_error.log
    CustomLog ${APACHE_LOG_DIR}/vote_access.log combined
</VirtualHost>
</IfModule>
