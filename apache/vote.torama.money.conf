# ============================================================================
# Apache reverse-proxy vhost for vote.torama.money
#
# Place at: /etc/apache2/sites-available/vote.torama.money.conf
# Enable:   a2ensite vote.torama.money && systemctl reload apache2
#
# Required modules (enable once):
#   a2enmod proxy proxy_http headers ssl rewrite
#
# TLS is provisioned by certbot (see DEPLOY.md). On first run certbot may add
# the SSLCertificate* lines for you; they are shown here for completeness.
# ============================================================================

<VirtualHost *:80>
    ServerName vote.torama.money

    # Allow Let's Encrypt HTTP-01 challenges through, redirect everything else.
    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteRule ^/?(.*) https://%{SERVER_NAME}/$1 [R=308,L]
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName vote.torama.money

    ProxyPreserveHost On
    ProxyRequests Off

    # Tell the Node app the original scheme so it sets Secure cookies correctly.
    RequestHeader set X-Forwarded-Proto "https"

    # Reverse proxy to the container bound on loopback (matches APP_PORT).
    ProxyPass        /  http://127.0.0.1:8090/  retry=0
    ProxyPassReverse /  http://127.0.0.1:8090/

    # ---- Security headers ----
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "no-referrer"

    # ---- TLS (managed by certbot) ----
    SSLEngine on
    SSLCertificateFile      /etc/letsencrypt/live/vote.torama.money/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/vote.torama.money/privkey.pem
    Include                 /etc/letsencrypt/options-ssl-apache.conf

    ErrorLog  ${APACHE_LOG_DIR}/vote_error.log
    CustomLog ${APACHE_LOG_DIR}/vote_access.log combined
</VirtualHost>
</IfModule>
